```html
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 여행 일정</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #f3f4f6, #e5e7eb);
      padding: 16px;
      color: #111827;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 12px;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 700;
    }

    .header p {
      color: #6b7280;
      margin-top: 8px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .badge-dark {
      background: #111827;
      color: white;
    }

    .badge-orange {
      background: #ffedd5;
      color: #c2410c;
    }

    .card-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .schedule-item {
      display: flex;
      gap: 14px;
      background: #f9fafb;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .emoji {
      font-size: 24px;
    }

    .time {
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-line;
      font-weight: 500;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .route-box {
      background: #f9fafb;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .route-date {
      color: #6b7280;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .route-text {
      font-weight: 600;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 18px;
    }

    .tab {
      border: none;
      background: #f3f4f6;
      color: #6b7280;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
    }

    .tab.active {
      background: #111827;
      color: white;
    }

    .info-box {
      background: #f9fafb;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .info-title {
      color: #6b7280;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .info-content {
      line-height: 1.7;
      white-space: pre-line;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
      padding: 20px 0;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const schedules = {
      day1: [
        ['09:00 ~ 10:00', '기상 + 준비 + 명동 카페', '🚶'],
        ['10:00 ~ 13:00', '명동 쇼핑\\n• 유니클로 명동중앙점\\n• 무신사 스탠다드 명동', '🛍️'],
        ['13:00 ~ 14:00', '점심 식사 (명동/을지로)', '🍜'],
        ['14:00 ~ 14:30', '명동 → DDP 이동', '🚇'],
        ['14:30 ~ 20:30', 'DDP 축제 & 야경 즐기기', '🎉'],
        ['20:30 ~ 21:00', 'DDP → 을지로 이동', '🚶'],
        ['21:00 ~ 00:30', '을지로 술자리', '🍻']
      ],

      day2: [
        ['09:30 ~ 10:00', '기상 + 준비', '☀️'],
        ['10:00 ~ 11:30', '청계천 산책', '🚶'],
        ['11:30 ~ 12:00', '청계천 → 광장시장', '🚶'],
        ['12:00 ~ 13:30', '광장시장 점심 + 낮술', '🍜🍺'],
        ['13:30 ~ 14:00', '광장시장 → 경복궁', '🚇'],
        ['14:00 ~ 16:00', '경복궁 or 북촌 구경', '🏯'],
        ['16:00 ~ 16:30', '경복궁 → 종로3가', '🚇'],
        ['16:30 ~ 17:30', '카페 / 휴식', '☕'],
        ['17:30 ~ 21:30', '종로 술거리 / 포차 / 노포', '🍻'],
        ['21:30 ~ 22:00', '종로 → 명동 복귀', '🚶']
      ]
    };

    const roomTabs = {
      checkin: `
        <div class="info-box">
          <div class="info-title">위치</div>
          <div class="info-content">
충무로역 8번 출구 인근
서울 중구 창경궁로1길 14
          </div>
        </div>

        <div class="info-box">
          <div class="info-title">체크인 안내</div>
          <div class="info-content">
• 체크인: 오후 4시 이후
• 체크아웃: 오전 11시 이전
• 체크인 당일 13~15시 셀프 체크인 정보 발송
          </div>
        </div>

        <div class="info-box">
          <div class="info-title">셀프 체크인 방법</div>
          <div class="info-content">
1. 문자/이메일 확인
2. 객실번호 & 비밀번호 확인
3. 바로 객실 입실
          </div>
        </div>
      `,

      room: `
        <div class="info-box">
          <div class="info-title">객실</div>
          <div class="info-content">Room 817 / 8층</div>
        </div>

        <div class="info-box">
          <div class="info-title">도어락 비밀번호</div>
          <div class="info-content">1234*</div>
        </div>

        <div class="info-box">
          <div class="info-title">Wi-Fi</div>
          <div class="info-content">
인시티(룸번호)
비밀번호: wetake6240
          </div>
        </div>
      `,

      cleaning: `
        <div class="info-box">
          <div class="info-title">청소 요청</div>
          <div class="info-content">
• 오후 1시 전 문고리 걸기
• 청소 시간: 오후 3~5시
          </div>
        </div>

        <div class="info-box">
          <div class="info-title">기본 서비스</div>
          <div class="info-content">
수건 교체 / 생수 리필 / 쓰레기 제거 / 침대 정리
          </div>
        </div>

        <div class="info-box">
          <div class="info-title">린넨 교체</div>
          <div class="info-content">
싱글 10,000원
더블 20,000원
          </div>
        </div>
      `
    };

    function createScheduleCard(title, badge, badgeClass, items) {
      return `
        <div class="card">
          <div class="badge ${badgeClass}">${badge}</div>
          <div class="card-title">${title}</div>

          ${items.map(item => `
            <div class="schedule-item">
              <div class="emoji">${item[2]}</div>

              <div>
                <div class="time">${item[0]}</div>
                <div class="desc">${item[1]}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    document.getElementById('app').innerHTML = `
      <div class="container">

        <div class="header">
          <h1>서울 여행 일정</h1>
          <p>5월 9일 ~ 10일</p>
        </div>

        ${createScheduleCard(
          '쇼핑 + DDP + 을지로',
          '📅 5월 9일 (토)',
          'badge-dark',
          schedules.day1
        )}

        ${createScheduleCard(
          '감성 도보 루트',
          '📅 5월 10일 (일)',
          'badge-orange',
          schedules.day2
        )}

        <div class="card">
          <div class="section-title">🧭 핵심 동선</div>

          <div class="route-box">
            <div class="route-date">5월 9일</div>
            <div class="route-text">
              명동 쇼핑 → DDP → 을지로
            </div>
          </div>

          <div class="route-box">
            <div class="route-date">5월 10일</div>
            <div class="route-text">
              명동 → 청계천 → 광장시장 → 경복궁 → 종로 → 명동
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">🏨 숙소 정보</div>

          <div class="tabs">
            <button class="tab active" data-tab="checkin">체크인</button>
            <button class="tab" data-tab="room">객실 정보</button>
            <button class="tab" data-tab="cleaning">청소 서비스</button>
          </div>

          <div id="tab-content">
            ${roomTabs.checkin}
          </div>
        </div>

        <div class="footer">
          서울 여행 잘 다녀오세요 ✨
        </div>

      </div>
    `;

    const tabButtons = document.querySelectorAll('.tab');
    const tabContent = document.getElementById('tab-content');

    tabButtons.forEach((button) => {
      button.addEventListener('click', () => {
        tabButtons.forEach((btn) => {
          btn.classList.remove('active');
        });

        button.classList.add('active');

        const tab = button.dataset.tab;

        tabContent.innerHTML = roomTabs[tab];
      });
    });
  </script>
</body>
</html>
```
